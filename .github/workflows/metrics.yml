name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновление раз в сутки
  workflow_dispatch: # Ручной запуск
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Первый файл: Подробная статистика языков и кода
      - name: Full Languages & Lines
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          
          # Настройки языков
          plugin_languages: yes
          plugin_languages_ignored: html, css # Убираем верстку, чтобы видеть реальный код
          plugin_languages_details: bytes-size, percentage, lines # Байты, проценты и СТРОКИ
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # Глубокий анализ кода (для точности строк)
          plugin_languages_limit: 8
          
          # Общая статистика строк
          plugin_lines: yes

      # Второй файл: Изометрический (3D) календарь
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: "" # Оставляем пустым, чтобы был только календарь
          config_timezone: Europe/Moscow
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Показывает последние полгода (выглядит лучше всего)
