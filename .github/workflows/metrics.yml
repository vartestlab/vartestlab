name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code Volume (Lines)
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: ""
          
          # 1. ВКЛЮЧАЕМ ОБЩИЙ СЧЕТЧИК СТРОК (появится над списком языков)
          plugin_lines: yes

          # 2. НАСТРОЙКИ ЯЗЫКОВ С ДЕТАЛИЗАЦИЕЙ СТРОК
          plugin_languages: yes
          # Заменяем bytes-size на lines
          plugin_languages_details: percentage, lines 
          plugin_languages_sections: most-used
          
          # ОЧЕНЬ ВАЖНО: включаем глубокий анализ, чтобы он считал именно строки
          plugin_languages_indepth: yes 
          
          # Даем плагину больше времени, так как считать строки в приватных репозиториях дольше
          plugin_languages_analysis_timeout: 15 
          
          plugin_languages_ignored: ""
          plugin_languages_limit: 8
