name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Languages Only (Vertical)
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: ""
          
          plugin_languages: yes
          # Добавляем bytes-size — это сделает строки длиннее и заставит их встать в одну колонку
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used
          plugin_languages_ignored: ""
