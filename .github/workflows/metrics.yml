name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновление раз в сутки
  workflow_dispatch: # Ручной запуск
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Первый файл: Подробная статистика языков и кода
      # Обновленный блок: Подробная статистика языков и СТРОК
      - name: Full Languages & Lines
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          
          # 1. ВКЛЮЧАЕМ ОБЩИЙ СЧЕТЧИК СТРОК (появится в заголовке)
          plugin_lines: yes

          # 2. НАСТРОЙКИ ЯЗЫКОВ С ДЕТАЛИЗАЦИЕЙ СТРОК
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, liquid # Игнорируем разметку
          # Явно просим: байты, проценты и строки
          plugin_languages_details: bytes-size, percentage, lines 
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # ОЧЕНЬ ВАЖНО: без этого строки не считаются
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15 # Даем больше времени на расчет
          
          plugin_languages_recent_load: 1000    # Загружать больше последних событий
          plugin_languages_recent_days: 14      # Искать активность за последние 14 дней
          repositories_affiliations: owner      # Считать только те репозитории, где ты владелец


