name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code Volume (Lines)
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: ""
          
          commits_authoring: vartestlab, ${{ secrets.MY_GIT_EMAIL }}
          repositories_affiliations: owner

          plugin_lines: yes

          plugin_languages: yes
          plugin_languages_details: percentage, lines 
          plugin_languages_sections: most-used
          
          # ОТКЛЮЧАЕМ глубокий анализ. Теперь он переведет байты в строки!
          # plugin_languages_indepth: yes 
          
          plugin_languages_ignored: ""
          plugin_languages_limit: 8
