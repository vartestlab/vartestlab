name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Full Languages & Lines
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: ""
          
          # Указываем автора для счетчика строк (используем секрет для почты)
          commits_authoring: vartestlab, ${{ secrets.MY_GIT_EMAIL }}
          
          # Считаем только твои репозитории
          repositories_affiliations: owner

          # 1. ОБЩИЙ СЧЕТЧИК СТРОК (всего за всю историю)
          plugin_lines: yes

          # 2. АНАЛИЗ ЯЗЫКОВ ПО ВСЕМУ ТЕКУЩЕМУ КОДУ
          plugin_languages: yes
          plugin_languages_indepth: yes # ВКЛЮЧАЕМ глубокий анализ файлов
          
          # ВАЖНО: Убираем параметры recent_days и recent_load, 
          # чтобы он не ограничивался только последними днями.
          
          plugin_languages_details: percentage, lines 
          plugin_languages_sections: most-used # Сортировка по общему объему
          
          # Даем больше времени, так как сканирование ВСЕГО кода требует ресурсов
          plugin_languages_analysis_timeout: 30 
          
          plugin_languages_ignored: ""
          plugin_languages_limit: 8
