name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Languages One Column
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: vartestlab
          template: classic
          base: ""
          
          # Ограничиваем ширину, чтобы заставить элементы встать друг под другом
          config_width: 400
          
          plugin_languages: yes
          # Явно указываем одну колонку
          plugin_languages_columns: 1
          # Оставляем проценты и размер кода
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used
          plugin_languages_ignored: ""
          plugin_languages_limit: 8
